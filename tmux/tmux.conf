# tmux configuration

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Enable mouse support
set -g mouse on

# Switch windows with prefix + arrow keys
bind Left previous-window
bind Right next-window

# Status line — green classic (top)
set -g status-position top
set -g status-style 'bg=colour2,fg=black'
set -g status-left ' #[bold]#S #[nobold]| '
set -g status-left-length 20
set -g status-right '| %H:%M '
set -g status-right-length 20
set -g window-status-format ' #I:#W '
set -g window-status-current-format '#[bg=black,fg=colour2,bold] #I:#W #[default]'
set -g window-status-separator ''

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
