# tmux configuration

# Prefix: C-a (C-a C-a sends literal C-a for beginning of line)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Terminal — true color support
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Enable mouse support
set -g mouse on

# Switch windows with prefix + arrow keys
bind Left previous-window
bind Right next-window

# Better pane splitting (keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Swap current window with another by index
bind S command-prompt -p "Swap with window:" "swap-window -t '%%'"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vi copy mode with macOS clipboard
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Status line — green classic (top)
#set -g status-position top
#set -g status-style 'bg=colour2,fg=black'
#set -g status-left ' #[bold]#S #[nobold]| '
#set -g status-left-length 20
#set -g status-right '| %H:%M '
#set -g status-right-length 20
#set -g window-status-format ' #I:#W '
#set -g window-status-current-format '#[bg=black,fg=colour2,bold] #I:#W #[default]'
#set -g window-status-separator ''

# Catppuccin theme
set -g @catppuccin_flavor 'mocha' # latte, frappe, macchiato or mocha

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Make the status line more pleasant.
set -g status-left ""
set -g status-right '#[fg=#{@thm_crust},bg=#{@thm_teal}] session: #S '

# Ensure that everything on the right side of the status line
# is included.
set -g status-right-length 100

# Plugin settings
set -g @resurrect-strategy-vim 'session'
set -g @continuum-restore 'on'

# Initialize TPM (keep at bottom)
run '~/.config/tmux/plugins/tpm/tpm'
